<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clés — Gestionnaire de mots de passe</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f5f5f7; --surface: #fff; --surface2: #f5f5f7;
    --border: rgba(0,0,0,0.09); --accent: #0071e3; --danger: #ff3b30;
    --green: #34c759; --text: #1d1d1f; --text2: #6e6e73; --text3: #aeaeb2;
    --radius: 14px; --radius-sm: 10px;
    --shadow: 0 2px 16px rgba(0,0,0,0.07);
  }
  body {
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
    min-height: 100vh; -webkit-font-smoothing: antialiased;
  }

  /* ── SCREENS ── */
  .screen { display: none; }
  .screen.active { display: block; }

  /* ── SETUP SCREEN ── */
  #setupScreen {
    min-height: 100vh; display: none; align-items: center;
    justify-content: center; padding: 24px; background: var(--bg);
  }
  #setupScreen.active { display: flex; }

  /* ── AUTH SCREEN ── */
  #authScreen {
    min-height: 100vh; display: none; align-items: center;
    justify-content: center; padding: 24px;
  }
  #authScreen.active { display: flex; }

  .auth-card {
    background: var(--surface); border-radius: 20px; padding: 40px 36px;
    width: 100%; max-width: 400px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.10); border: 1px solid var(--border);
  }
  .auth-logo { text-align: center; font-size: 2.6rem; margin-bottom: 6px; }
  .auth-title { text-align: center; font-size: 1.5rem; font-weight: 700; margin-bottom: 4px; }
  .auth-sub { text-align: center; font-size: 0.84rem; color: var(--text2); margin-bottom: 28px; line-height: 1.5; }

  .auth-tabs { display: flex; background: var(--surface2); border-radius: 10px; padding: 3px; margin-bottom: 24px; }
  .auth-tab {
    flex: 1; text-align: center; padding: 8px; border-radius: 8px;
    font-size: 0.87rem; font-weight: 600; font-family: inherit;
    border: none; background: none; cursor: pointer; color: var(--text2); transition: all .2s;
  }
  .auth-tab.active { background: white; color: var(--text); box-shadow: 0 1px 6px rgba(0,0,0,0.1); }

  .field { margin-bottom: 13px; }
  .field label { display: block; font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text2); margin-bottom: 5px; }
  .field input {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 12px 14px; font-size: 0.92rem;
    color: var(--text); font-family: inherit; outline: none;
    transition: border-color .15s, box-shadow .15s;
  }
  .field input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,113,227,.1); background: white; }
  .field input::placeholder { color: var(--text3); }

  .err-box {
    background: rgba(255,59,48,.07); border: 1px solid rgba(255,59,48,.2);
    border-radius: 9px; padding: 10px 14px; font-size: 0.82rem; color: var(--danger);
    margin-bottom: 13px; display: none; line-height: 1.4;
  }
  .err-box.show { display: block; }

  .info-box {
    background: rgba(0,113,227,.07); border: 1px solid rgba(0,113,227,.18);
    border-radius: 9px; padding: 10px 14px; font-size: 0.82rem; color: var(--accent);
    margin-bottom: 13px; display: none; line-height: 1.5;
  }
  .info-box.show { display: block; }

  .btn-full {
    width: 100%; background: var(--accent); color: white; border: none;
    border-radius: var(--radius-sm); padding: 13px; font-size: 0.93rem;
    font-weight: 600; font-family: inherit; cursor: pointer;
    transition: opacity .15s, transform .1s; display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn-full:hover { opacity: 0.88; }
  .btn-full:active { transform: scale(0.98); }
  .btn-full:disabled { opacity: 0.5; pointer-events: none; }

  .btn-secondary {
    width: 100%; background: none; color: var(--text2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 11px; font-size: 0.88rem;
    font-weight: 500; font-family: inherit; cursor: pointer; margin-top: 8px;
    transition: background .15s, color .15s;
  }
  .btn-secondary:hover { background: var(--surface2); color: var(--text); }

  /* ── APP ── */
  #appScreen { display: none; }
  #appScreen.active { display: block; }
  .wrapper { max-width: 700px; margin: 0 auto; padding: 52px 24px 80px; }

  .topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 36px; }
  .topbar h1 { font-size: 1.9rem; font-weight: 700; letter-spacing: -0.4px; }
  .topbar p { font-size: 0.82rem; color: var(--text2); margin-top: 2px; }
  .topbar-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

  .user-pill {
    display: flex; align-items: center; gap: 7px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 999px; padding: 5px 13px 5px 8px;
    font-size: 0.79rem; color: var(--text2); box-shadow: var(--shadow);
  }
  .user-dot {
    width: 22px; height: 22px; border-radius: 50%; background: var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; color: white; font-weight: 700; flex-shrink: 0;
  }

  .sync-btn {
    width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--border);
    background: var(--surface); color: var(--text2); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: var(--shadow); transition: all .15s;
  }
  .sync-btn:hover { border-color: var(--accent); color: var(--accent); }
  .sync-btn.spinning svg { animation: spin .7s linear infinite; }

  .logout-btn {
    background: none; border: 1px solid var(--border); border-radius: 999px;
    padding: 5px 13px; font-size: 0.79rem; color: var(--text2); font-family: inherit;
    cursor: pointer; transition: all .15s;
  }
  .logout-btn:hover { border-color: var(--danger); color: var(--danger); }

  /* Search */
  .search-wrap { position: relative; margin-bottom: 16px; }
  .search-wrap svg { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); color: var(--text3); pointer-events: none; }
  .search-wrap input {
    width: 100%; background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 12px 16px 12px 40px;
    font-size: 0.92rem; color: var(--text); outline: none; box-shadow: var(--shadow);
    transition: border-color .2s, box-shadow .2s; font-family: inherit;
  }
  .search-wrap input::placeholder { color: var(--text3); }
  .search-wrap input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,113,227,.12); }

  /* Filters */
  .filters { display: flex; gap: 6px; margin-bottom: 24px; flex-wrap: wrap; }
  .filter-btn {
    padding: 5px 14px; border-radius: 999px; border: 1px solid var(--border);
    background: var(--surface); color: var(--text2); font-size: 0.79rem;
    font-family: inherit; cursor: pointer; transition: all .15s; font-weight: 500;
  }
  .filter-btn:hover { background: #e8e8ed; }
  .filter-btn.active { background: var(--text); border-color: var(--text); color: white; }

  /* Add form */
  .add-card {
    background: var(--surface); border-radius: var(--radius); padding: 20px 22px;
    margin-bottom: 24px; box-shadow: var(--shadow); border: 1px solid var(--border);
  }
  .card-label { font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.6px; color: var(--text2); margin-bottom: 14px; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .form-grid .full { grid-column: 1 / -1; }
  .input-group { display: flex; flex-direction: column; gap: 4px; }
  .input-group label { font-size: 0.69rem; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; }
  .input-group input, .input-group select {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 10px 12px; font-size: 0.88rem;
    color: var(--text); font-family: inherit; outline: none;
    transition: border-color .15s, box-shadow .15s; width: 100%; -webkit-appearance: none;
  }
  .input-group input::placeholder { color: var(--text3); }
  .input-group input:focus, .input-group select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,113,227,.1); background: white; }
  .pass-wrap { position: relative; }
  .pass-wrap input { padding-right: 72px; }
  .icon-btn {
    position: absolute; top: 50%; transform: translateY(-50%);
    background: none; border: none; cursor: pointer; color: var(--text3);
    padding: 6px; display: flex; align-items: center; border-radius: 6px; transition: color .15s;
  }
  .icon-btn:hover { color: var(--text2); }
  .icon-btn.vis-btn { right: 34px; }
  .icon-btn.gen-btn { right: 4px; }
  .strength-row { display: flex; gap: 4px; margin-top: 5px; }
  .strength-dot { flex: 1; height: 3px; border-radius: 2px; background: #e5e5ea; transition: background .3s; }
  .form-footer { display: flex; justify-content: flex-end; margin-top: 13px; }
  .btn-add {
    background: var(--accent); color: white; border: none; border-radius: var(--radius-sm);
    padding: 10px 22px; font-size: 0.87rem; font-weight: 600; font-family: inherit;
    cursor: pointer; transition: opacity .15s, transform .1s;
    display: flex; align-items: center; gap: 6px;
  }
  .btn-add:hover { opacity: 0.88; }
  .btn-add:active { transform: scale(0.98); }
  .btn-add:disabled { opacity: 0.5; pointer-events: none; }

  /* List */
  .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .count-label { font-size: 0.75rem; color: var(--text3); }

  .entries-group { background: var(--surface); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); border: 1px solid var(--border); }
  .entry-row {
    display: flex; align-items: center; gap: 12px; padding: 13px 15px;
    border-bottom: 1px solid var(--border); transition: background .1s; animation: fadeIn .2s ease;
  }
  .entry-row:last-child { border-bottom: none; }
  .entry-row:hover { background: #fafafa; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(-4px); } to { opacity:1; transform:translateY(0); } }

  .entry-icon { width: 35px; height: 35px; border-radius: 9px; background: var(--surface2); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
  .entry-body { flex: 1; min-width: 0; }
  .entry-site { font-size: 0.89rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .entry-meta { font-size: 0.75rem; color: var(--text2); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .entry-pass { font-size: 0.79rem; color: var(--text3); letter-spacing: 2px; min-width: 76px; text-align: right; flex-shrink: 0; }
  .entry-pass.show { color: var(--text2); letter-spacing: 0; font-size: 0.75rem; }
  .entry-actions { display: flex; gap: 1px; flex-shrink: 0; }
  .act-btn { width: 30px; height: 30px; border-radius: 7px; border: none; background: none; color: var(--text3); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background .12s, color .12s; }
  .act-btn:hover { background: var(--surface2); color: var(--text2); }
  .act-btn.del:hover { color: var(--danger); background: rgba(255,59,48,.08); }

  /* Empty */
  .empty { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); box-shadow: var(--shadow); text-align: center; padding: 50px 24px; color: var(--text3); }
  .empty p { font-size: 0.85rem; margin-top: 10px; }

  /* Spinner */
  .spinner { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,.3); border-top-color: white; border-radius: 50%; animation: spin .6s linear infinite; }
  .spinner.dark { border-color: rgba(0,0,0,.1); border-top-color: var(--accent); }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Toast */
  .toast {
    position: fixed; bottom: 28px; left: 50%;
    transform: translateX(-50%) translateY(60px);
    background: rgba(29,29,31,.9); backdrop-filter: blur(16px);
    color: white; border-radius: 999px; padding: 9px 20px;
    font-size: 0.81rem; font-weight: 500; font-family: inherit;
    transition: transform .28s cubic-bezier(.34,1.56,.64,1), opacity .28s;
    z-index: 999; white-space: nowrap; opacity: 0; pointer-events: none;
  }
  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

  @media (max-width: 540px) {
    .form-grid { grid-template-columns: 1fr; }
    .form-grid .full { grid-column: 1; }
    .entry-pass { display: none; }
    .topbar { flex-wrap: wrap; gap: 10px; }
    .auth-card { padding: 32px 22px; }
  }
</style>
</head>
<body>

<!-- ══════════════ SETUP SCREEN (première fois) ══════════════ -->
<div id="setupScreen">
  <div class="auth-card">
    <div class="auth-logo">🔑</div>
    <div class="auth-title">Clés</div>
    <div class="auth-sub">Pour synchroniser tes mots de passe sur tous tes appareils, tu as besoin d'une clé API JSONBin gratuite.<br><br>Crée un compte sur <strong>jsonbin.io</strong> → API Keys → copie ta clé.</div>
    <div class="err-box" id="setupErr"></div>
    <div class="field">
      <label>Clé API JSONBin</label>
      <input type="text" id="setupKey" placeholder="$2b$10$..." onkeydown="if(event.key==='Enter') saveSetup()">
    </div>
    <button class="btn-full" onclick="saveSetup()" id="btnSetup">Continuer →</button>
    <button class="btn-secondary" onclick="useLocal()">Utiliser sans compte (données locales)</button>
  </div>
</div>

<!-- ══════════════ AUTH SCREEN ══════════════ -->
<div id="authScreen">
  <div class="auth-card">
    <div class="auth-logo">🔑</div>
    <div class="auth-title">Clés</div>
    <div class="auth-sub">Tes mots de passe, partout avec toi.</div>

    <div class="auth-tabs">
      <button class="auth-tab active" id="tabLogin" onclick="switchTab('login')">Connexion</button>
      <button class="auth-tab" id="tabRegister" onclick="switchTab('register')">Inscription</button>
    </div>

    <div class="err-box" id="authErr"></div>
    <div class="info-box" id="authInfo"></div>

    <div class="field">
      <label>Identifiant</label>
      <input type="text" id="authUser" placeholder="MonIdentifiant" onkeydown="if(event.key==='Enter')submitAuth()">
    </div>
    <div class="field">
      <label>Mot de passe du compte</label>
      <input type="password" id="authPass" placeholder="••••••••" onkeydown="if(event.key==='Enter')submitAuth()">
    </div>
    <button class="btn-full" id="btnAuth" onclick="submitAuth()">Se connecter</button>
    <button class="btn-secondary" onclick="showSetup()">⚙️ Changer la clé API</button>
  </div>
</div>

<!-- ══════════════ APP SCREEN ══════════════ -->
<div id="appScreen">
<div class="wrapper">

  <div class="topbar">
    <div>
      <h1>🔑 Clés</h1>
      <p>Tous tes mots de passe, partout.</p>
    </div>
    <div class="topbar-right">
      <div class="user-pill">
        <div class="user-dot" id="userDot">?</div>
        <span id="userLabel">—</span>
      </div>
      <button class="sync-btn" id="syncBtn" onclick="syncNow()" title="Synchroniser">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
      </button>
      <button class="logout-btn" onclick="logout()">Déconnexion</button>
    </div>
  </div>

  <div class="search-wrap">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="searchInput" placeholder="Rechercher par site, identifiant ou email…" oninput="render()">
  </div>

  <div class="filters" id="filterBar"></div>

  <div class="add-card">
    <div class="card-label">Nouvelle entrée</div>
    <div class="form-grid">
      <div class="input-group">
        <label>Site / App</label>
        <input type="text" id="iSite" placeholder="Gmail, Netflix…">
      </div>
      <div class="input-group">
        <label>Catégorie</label>
        <select id="iCat">
          <option value="Réseaux sociaux">📱 Réseaux sociaux</option>
          <option value="Email">📧 Email</option>
          <option value="Banque">🏦 Banque</option>
          <option value="Shopping">🛒 Shopping</option>
          <option value="Streaming">🎬 Streaming</option>
          <option value="Travail">💼 Travail</option>
          <option value="Autre">🔗 Autre</option>
        </select>
      </div>
      <div class="input-group full">
        <label>Identifiant / Email</label>
        <input type="text" id="iUser" placeholder="email@exemple.com">
      </div>
      <div class="input-group full">
        <label>Mot de passe</label>
        <div class="pass-wrap">
          <input type="password" id="iPass" placeholder="Mot de passe…" oninput="updateStrength(this.value)">
          <button class="icon-btn vis-btn" onclick="toggleFormVis()" tabindex="-1">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
          <button class="icon-btn gen-btn" onclick="generatePwd()" tabindex="-1">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
          </button>
        </div>
        <div class="strength-row">
          <div class="strength-dot" id="s1"></div><div class="strength-dot" id="s2"></div>
          <div class="strength-dot" id="s3"></div><div class="strength-dot" id="s4"></div>
          <div class="strength-dot" id="s5"></div>
        </div>
      </div>
    </div>
    <div class="form-footer">
      <button class="btn-add" id="btnAdd" onclick="addEntry()">Ajouter</button>
    </div>
  </div>

  <div class="section-header">
    <span class="card-label">Mots de passe</span>
    <span class="count-label" id="countLabel"></span>
  </div>
  <div id="listWrap"></div>

</div>
</div>

<div class="toast" id="toast"></div>

<script>
// ══ SVG icons ══
const EYE     = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
const EYE_OFF = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`;
const COPY    = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>`;
const TRASH   = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>`;

const ICONS = {'Réseaux sociaux':'📱','Email':'📧','Banque':'🏦','Shopping':'🛒','Streaming':'🎬','Travail':'💼','Autre':'🔗'};

// ══ State ══
let entries = [];
let filter  = 'Tout';
let currentUser = null;
let apiKey  = null;
let localMode = false;
let authMode = 'login';

// Simple hash function for passwords (not cryptographic, but hides plaintext in storage)
async function hashPassword(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

// ══ Storage key helpers ══
function usersKey()   { return `cles_users`; }
function binIdKey()   { return `cles_bin_${currentUser}`; }
function sessionKey() { return `cles_session`; }

// ══ LOCAL STORAGE (for users index + fallback) ══
function lsGet(k)    { try { return JSON.parse(localStorage.getItem(k)); } catch { return null; } }
function lsSet(k, v) { localStorage.setItem(k, JSON.stringify(v)); }

// ══ JSONBIN API ══
const JSONBIN = 'https://api.jsonbin.io/v3';

async function binCreate(data) {
  const r = await fetch(`${JSONBIN}/b`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'X-Master-Key': apiKey, 'X-Bin-Private': 'true' },
    body: JSON.stringify(data)
  });
  if (!r.ok) throw new Error('JSONBin create failed: ' + r.status);
  const j = await r.json();
  return j.metadata.id;
}

async function binRead(id) {
  const r = await fetch(`${JSONBIN}/b/${id}/latest`, {
    headers: { 'X-Master-Key': apiKey }
  });
  if (!r.ok) throw new Error('JSONBin read failed: ' + r.status);
  const j = await r.json();
  return j.record;
}

async function binUpdate(id, data) {
  const r = await fetch(`${JSONBIN}/b/${id}`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json', 'X-Master-Key': apiKey },
    body: JSON.stringify(data)
  });
  if (!r.ok) throw new Error('JSONBin update failed: ' + r.status);
}

// ══ SETUP ══
function showSetup() {
  document.getElementById('setupScreen').classList.add('active');
  document.getElementById('authScreen').classList.remove('active');
  document.getElementById('appScreen').classList.remove('active');
}

async function saveSetup() {
  const key = document.getElementById('setupKey').value.trim();
  if (!key) { showSetupErr('Colle ta clé API JSONBin'); return; }
  const btn = document.getElementById('btnSetup');
  btn.innerHTML = '<div class="spinner"></div>'; btn.disabled = true;
  // Test the key
  try {
    const r = await fetch(`${JSONBIN}/b`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Master-Key': key, 'X-Bin-Private': 'true' },
      body: JSON.stringify({ test: true })
    });
    if (!r.ok) throw new Error('Clé invalide');
    const j = await r.json();
    // Delete test bin
    await fetch(`${JSONBIN}/b/${j.metadata.id}`, { method: 'DELETE', headers: { 'X-Master-Key': key } });
    apiKey = key;
    lsSet('cles_apikey', key);
    showAuth();
  } catch {
    showSetupErr('Clé invalide ou erreur réseau. Vérifie ta clé sur jsonbin.io');
  } finally {
    btn.textContent = 'Continuer →'; btn.disabled = false;
  }
}

function useLocal() {
  localMode = true;
  lsSet('cles_local', true);
  showAuth();
}

function showSetupErr(msg) {
  const e = document.getElementById('setupErr');
  e.textContent = msg; e.classList.add('show');
}

// ══ AUTH ══
function showAuth() {
  document.getElementById('setupScreen').classList.remove('active');
  document.getElementById('authScreen').classList.add('active');
  document.getElementById('appScreen').classList.remove('active');
}

function switchTab(mode) {
  authMode = mode;
  document.getElementById('tabLogin').classList.toggle('active', mode === 'login');
  document.getElementById('tabRegister').classList.toggle('active', mode === 'register');
  document.getElementById('btnAuth').textContent = mode === 'login' ? 'Se connecter' : 'Créer mon compte';
  document.getElementById('authErr').classList.remove('show');
  document.getElementById('authInfo').classList.remove('show');
}

function showAuthErr(msg)  { const e = document.getElementById('authErr'); e.textContent = msg; e.classList.add('show'); }
function showAuthInfo(msg) { const e = document.getElementById('authInfo'); e.innerHTML = msg; e.classList.add('show'); }

async function submitAuth() {
  const username = document.getElementById('authUser').value.trim();
  const password = document.getElementById('authPass').value;
  document.getElementById('authErr').classList.remove('show');
  document.getElementById('authInfo').classList.remove('show');

  if (!username || !password) { showAuthErr('Remplis tous les champs'); return; }

  const btn = document.getElementById('btnAuth');
  btn.innerHTML = '<div class="spinner"></div>'; btn.disabled = true;

  try {
    const passHash = await hashPassword(password);
    const users = lsGet(usersKey()) || {};

    if (authMode === 'register') {
      if (users[username]) { showAuthErr('Cet identifiant est déjà pris'); return; }
      // Create bin for this user
      let binId = null;
      if (!localMode) {
        binId = await binCreate({ entries: [] });
      }
      users[username] = { passHash, binId };
      lsSet(usersKey(), users);
      showAuthInfo('✅ Compte créé ! Tu peux maintenant te connecter.');
      switchTab('login');
      document.getElementById('authUser').value = username;
      document.getElementById('authPass').value = '';
      return;
    }

    // Login
    if (!users[username]) { showAuthErr('Identifiant introuvable'); return; }
    if (users[username].passHash !== passHash) { showAuthErr('Mot de passe incorrect'); return; }

    currentUser = username;
    lsSet(sessionKey(), { username, passHash });
    await enterApp(username, users[username].binId);

  } catch (err) {
    showAuthErr('Erreur : ' + err.message);
  } finally {
    btn.textContent = authMode === 'login' ? 'Se connecter' : 'Créer mon compte';
    btn.disabled = false;
  }
}

async function enterApp(username, binId) {
  document.getElementById('authScreen').classList.remove('active');
  document.getElementById('appScreen').classList.add('active');
  document.getElementById('userDot').textContent = username[0].toUpperCase();
  document.getElementById('userLabel').textContent = username;

  // Load entries
  if (!localMode && binId) {
    try {
      const data = await binRead(binId);
      entries = (data.entries || []).map(e => ({ ...e, vis: false }));
    } catch {
      entries = lsGet(`cles_entries_${username}`) || [];
      showToast('⚠️ Mode hors-ligne');
    }
  } else {
    entries = lsGet(`cles_entries_${username}`) || [];
  }

  updateFilters(); render();
}

function logout() {
  currentUser = null; entries = [];
  localStorage.removeItem(sessionKey());
  document.getElementById('appScreen').classList.remove('active');
  document.getElementById('authScreen').classList.add('active');
  document.getElementById('authUser').value = '';
  document.getElementById('authPass').value = '';
}

// ══ SYNC ══
async function syncNow() {
  if (localMode) { showToast('Mode local — pas de sync'); return; }
  const users = lsGet(usersKey()) || {};
  const binId = users[currentUser]?.binId;
  if (!binId) return;

  const btn = document.getElementById('syncBtn');
  btn.classList.add('spinning');
  try {
    await binUpdate(binId, { entries: entries.map(({ vis, ...e }) => e) });
    lsSet(`cles_entries_${currentUser}`, entries);
    showToast('✅ Synchronisé');
  } catch {
    showToast('❌ Erreur de sync');
  } finally {
    btn.classList.remove('spinning');
  }
}

async function saveEntries() {
  // Always save locally as backup
  lsSet(`cles_entries_${currentUser}`, entries);
  // Sync to cloud
  if (!localMode) {
    const users = lsGet(usersKey()) || {};
    const binId = users[currentUser]?.binId;
    if (binId) {
      try {
        await binUpdate(binId, { entries: entries.map(({ vis, ...e }) => e) });
      } catch { /* will sync next time */ }
    }
  }
}

// ══ ENTRIES ══
async function addEntry() {
  const site     = document.getElementById('iSite').value.trim();
  const username = document.getElementById('iUser').value.trim();
  const password = document.getElementById('iPass').value;
  const category = document.getElementById('iCat').value;
  if (!site || !password) { showToast('Site et mot de passe requis'); return; }

  const btn = document.getElementById('btnAdd');
  btn.innerHTML = '<div class="spinner"></div>'; btn.disabled = true;

  const entry = { id: Date.now(), site, username, password, category, vis: false };
  entries.unshift(entry);
  ['iSite','iUser','iPass'].forEach(id => document.getElementById(id).value = '');
  updateStrength(''); updateFilters(); render();

  await saveEntries();
  btn.textContent = 'Ajouter'; btn.disabled = false;
  showToast('✅ Entrée ajoutée et sauvegardée');
}

async function deleteEntry(id) {
  entries = entries.filter(e => e.id !== id);
  updateFilters(); render();
  await saveEntries();
  showToast('Supprimé');
}

function toggleVis(id) {
  const e = entries.find(e => e.id === id);
  if (e) { e.vis = !e.vis; render(); }
}

function copyPass(id) {
  const e = entries.find(e => e.id === id);
  if (!e) return;
  navigator.clipboard.writeText(e.password).then(() => showToast('📋 Copié'));
}

// ══ UI ══
function getFiltered() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  return entries.filter(e => {
    const matchCat = filter === 'Tout' || e.category === filter;
    const matchQ = !q || e.site.toLowerCase().includes(q) || (e.username||'').toLowerCase().includes(q);
    return matchCat && matchQ;
  });
}

function render() {
  const list = getFiltered();
  const wrap = document.getElementById('listWrap');
  document.getElementById('countLabel').textContent = list.length + (list.length > 1 ? ' entrées' : ' entrée');

  if (!list.length) {
    wrap.innerHTML = `<div class="empty"><svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg><p>Aucune entrée</p></div>`;
    return;
  }

  wrap.innerHTML = `<div class="entries-group">${list.map(e => `
    <div class="entry-row">
      <div class="entry-icon">${ICONS[e.category]||'🔗'}</div>
      <div class="entry-body">
        <div class="entry-site">${esc(e.site)}</div>
        <div class="entry-meta">${esc(e.username)||'—'}</div>
      </div>
      <div class="entry-pass ${e.vis?'show':''}">${e.vis ? esc(e.password) : '••••••••'}</div>
      <div class="entry-actions">
        <button class="act-btn" onclick="toggleVis(${e.id})">${e.vis ? EYE_OFF : EYE}</button>
        <button class="act-btn" onclick="copyPass(${e.id})">${COPY}</button>
        <button class="act-btn del" onclick="deleteEntry(${e.id})">${TRASH}</button>
      </div>
    </div>`).join('')}</div>`;
}

function updateFilters() {
  const cats = ['Tout', ...new Set(entries.map(e => e.category))];
  document.getElementById('filterBar').innerHTML = cats.map(c =>
    `<button class="filter-btn ${c===filter?'active':''}" onclick="setFilter('${c}',this)">${c}</button>`
  ).join('');
}

function setFilter(cat, btn) {
  filter = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active'); render();
}

function generatePwd() {
  const c = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*';
  let p = ''; for (let i=0;i<16;i++) p += c[Math.floor(Math.random()*c.length)];
  const inp = document.getElementById('iPass');
  inp.value = p; inp.type = 'text'; updateStrength(p);
  showToast('Mot de passe généré');
  setTimeout(() => { if(inp.type==='text') inp.type='password'; }, 3000);
}

function updateStrength(val) {
  let s = 0;
  if (val.length>=8) s++; if (val.length>=12) s++;
  if (/[A-Z]/.test(val)) s++; if (/[0-9]/.test(val)) s++; if (/[^a-zA-Z0-9]/.test(val)) s++;
  const cols=['#ff3b30','#ff9500','#ffcc00','#34c759','#34c759'];
  for(let i=1;i<=5;i++) document.getElementById('s'+i).style.background = i<=s ? cols[s-1] : '#e5e5ea';
}

function toggleFormVis() {
  const inp = document.getElementById('iPass');
  inp.type = inp.type === 'password' ? 'text' : 'password';
}

function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

let tt;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(tt); tt = setTimeout(() => t.classList.remove('show'), 2400);
}

// ══ INIT ══
function init() {
  apiKey    = lsGet('cles_apikey');
  localMode = lsGet('cles_local') || false;
  const session = lsGet(sessionKey());

  if (session) {
    // Restore session
    const users = lsGet(usersKey()) || {};
    if (users[session.username] && users[session.username].passHash === session.passHash) {
      currentUser = session.username;
      enterApp(session.username, users[session.username]?.binId);
      return;
    }
  }

  if (!apiKey && !localMode) {
    showSetup();
  } else {
    showAuth();
  }
}

init();
</script>
